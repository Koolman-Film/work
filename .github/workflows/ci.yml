# CI pipeline — runs on every push to main + every PR.
#
# Why this set of jobs:
#   - Catches what local pre-commit hooks can't (e.g., tests that fail only
#     in CI environment, or developers using SKIP_SIMPLE_GIT_HOOKS).
#   - Build job validates Next.js compiles end-to-end + Prisma client
#     generates from the committed schema.
#
# We run jobs in parallel where they're independent (lint + typecheck +
# test don't depend on each other) so total wall time stays under 2 min.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Pinned Node to match local development. pnpm version comes from the
  # `packageManager` field in package.json (pnpm/action-setup@v4 reads it;
  # passing an explicit `version:` too triggers ERR_PNPM_BAD_PM_VERSION).
  NODE_VERSION: '24'

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Type-check (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # Prisma's generated types are required for `tsc` — without this,
      # any import from @prisma/client fails with "module has no exports."
      - run: pnpm prisma generate
      - run: pnpm typecheck

  test:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm test

  integration:
    name: Integration tests (Vitest + Postgres)
    runs-on: ubuntu-latest
    # A throwaway Postgres for the service-flow tests (payroll run/publish,
    # advance balance, OT candidates). The Prisma migrations are vanilla-PG
    # compatible (Supabase Storage RLS lives outside them), so a plain image
    # works. Mirrors the local koolman_test DB.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: koolman_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/koolman_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      # Apply the schema to the throwaway DB, then run the integration suite.
      - run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
          DIRECT_URL: ${{ env.TEST_DATABASE_URL }}
      - run: pnpm test:integration

  build:
    name: Build (Next.js)
    runs-on: ubuntu-latest
    # Don't burn CI minutes on a build if the earlier jobs already failed.
    needs: [lint, typecheck, test, integration]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm build
        env:
          # Build-time env stubs — Next inlines NEXT_PUBLIC_* at build,
          # so even production builds need *some* value here. Fake values
          # are fine because CI never executes user-facing requests.
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder-anon-key-for-build-only'
          NEXT_PUBLIC_LIFF_ID: 'placeholder-liff-id'
          PAIRING_JWT_SECRET: 'placeholder-secret-32chars-for-build-only-xx'
